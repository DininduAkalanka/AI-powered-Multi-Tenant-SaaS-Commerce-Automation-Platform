version: '3.9'

services:
  # ─────────────────────────────────────────────
  # PostgreSQL with pgvector extension
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: commercepilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-commercepilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-commercepilot_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-commercepilot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-commercepilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis (BullMQ queue + session store)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: commercepilot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MailHog — local email catcher (free)
  # Web UI: http://localhost:8025
  # SMTP:    localhost:1025
  # ─────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: commercepilot_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: commercepilot_network
